<!DOCTYPE html>
<html>
<head>
  <title>Class Assistant</title>
</head>
<body>
  <h1>Class Assistant</h1>
  <p>Ask a school question and choose what you want the app to do.</p>

  <textarea id="studentInput" rows="6" cols="50" placeholder="Type your class question here..."></textarea>
  <br><br>

  <select id="taskType">
    <option value="explain">Explain</option>
    <option value="summarize">Summarize</option>
    <option value="quiz">Make Quiz</option>
  </select>

  <button onclick="runApp()">Run Assistant</button>

  <h2>Result</h2>
  <p id="output">Waiting...</p>

  <script src="script3.js"></script>
  <script src="script2.js"></script>
  <script src="script1.js"></script>
</body>
</html>
